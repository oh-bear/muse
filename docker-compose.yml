services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-muse}
      POSTGRES_USER: ${POSTGRES_USER:-muse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-muse_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-muse}"]
      interval: 5s
      timeout: 3s
      retries: 5

  miniflux:
    image: miniflux/miniflux:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-muse}:${POSTGRES_PASSWORD:-muse_dev}@postgres/${POSTGRES_DB:-muse}?sslmode=disable
      RUN_MIGRATIONS: 1
      CREATE_ADMIN: 1
      ADMIN_USERNAME: ${MINIFLUX_ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${MINIFLUX_ADMIN_PASSWORD:-admin123}
      FETCHER_ALLOW_PRIVATE_NETWORKS: 1
    ports:
      - "${MINIFLUX_PORT:-8080}:8080"

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      miniflux:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-muse}:${POSTGRES_PASSWORD:-muse_dev}@postgres:5432/${POSTGRES_DB:-muse}
      MINIFLUX_URL: http://miniflux:8080

volumes:
  pgdata:
